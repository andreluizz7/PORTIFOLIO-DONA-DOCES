<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DONA DOCES</title>
        <link rel="stylesheet" href="Styles/Styles.css">
        <link rel="stylesheet" href="Styles/login.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap');
        </style>
</head>
    <body>
        <header class="header__login">
            <div class="header__info">
                <h1 class="titulo">Bem-vindo à Dona Doces!</h1>
                <p class="texto">Faça login para acessar sua conta e desfrutar dos nossos deliciosos doces.</p>
            </div>
        </header>

        <main>
            <section class="section__login">
                <p class="texto">Preencha os campos abaixo para fazer login:</p>
                <form class="login">
                    <input class="email" type="email" id="email" placeholder="EMAIL" name="email" required>

                    <input class="pass" type="password" id="password" placeholder="**********" name="password" required>
                </form>
                <button class="botao" type="submit">Entrar</button>
            </section>
        </main>

        <footer class="footer__login">
            <p class="footer__texto__login">© 2026 Dona Doces. Todos os direitos reservados.</p>
            <p class="footer__autor__login">Feito com ☕ e ❤️ por André L Blazius</p>
        </footer>

    </body>
</html>
